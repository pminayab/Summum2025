  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      --cream: #FAF6EE; --warm-gray: #9A9080; --border: #E8DFC8;
      --gran: #0F0D0A; --top20: #C9A84C; --winner: #2D6A4F; --nominated: #7A7060;
    }
    html, body { height: 100%; overflow: hidden; font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); display: flex; flex-direction: column; }
    header { background: var(--ink); padding: 12px 20px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; z-index: 1000; position: relative; overflow: hidden; }
    header::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 50% 200% at 5% 50%, rgba(201,168,76,.18) 0%, transparent 70%); }
    .h-trophy { font-size: 30px; position: relative; filter: drop-shadow(0 0 8px rgba(201,168,76,.5)); }
    .h-text { position: relative; }
    .h-text h1 { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 900; color: #fff; line-height: 1; }
    .h-text h1 span { color: var(--gold); }
    .h-text p { color: var(--warm-gray); font-size: 11px; margin-top: 2px; }
    .h-count { margin-left: auto; position: relative; background: rgba(201,168,76,.12); border: 1px solid rgba(201,168,76,.25); border-radius: 6px; padding: 5px 12px; text-align: center; }
    .h-count .n { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 900; color: var(--gold); line-height: 1; }
    .h-count .l { font-size: 9px; color: var(--warm-gray); letter-spacing: .8px; text-transform: uppercase; }
    .filters { background: #fff; border-bottom: 1px solid var(--border); padding: 8px 14px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; flex-shrink: 0; z-index: 999; box-shadow: 0 2px 8px rgba(0,0,0,.05); }
    .flabel { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--warm-gray); font-weight: 600; }
    .fbtn { border: 1.5px solid var(--border); background: transparent; border-radius: 14px; padding: 4px 11px; font-size: 11.5px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: all .18s; color: var(--ink); }
    .fbtn:hover { border-color: var(--gold); color: var(--gold-dark); }
    .fbtn.active { color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
    .fbtn[data-f="all"].active { background: var(--gold); border-color: var(--gold); }
    .fbtn[data-f="gran"].active { background: var(--gran); border-color: var(--gran); }
    .fbtn[data-f="top20"].active { background: var(--top20); border-color: var(--top20); }
    .fbtn[data-f="winner"].active { background: var(--winner); border-color: var(--winner); }
    .fbtn[data-f="nominated"].active { background: var(--nominated); border-color: var(--nominated); }
    .fsearch { margin-left: auto; position: relative; }
    .fsearch input { border: 1.5px solid var(--border); border-radius: 14px; padding: 5px 12px 5px 28px; font-size: 12px; font-family: 'DM Sans', sans-serif; outline: none; width: 170px; background: var(--cream); transition: border-color .18s; }
    .fsearch input:focus { border-color: var(--gold); }
    .fsearch::before { content: '🔍'; position: absolute; left: 9px; top: 50%; transform: translateY(-50%); font-size: 11px; }
    .body { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 330px; flex-shrink: 0; display: flex; flex-direction: column; border-right: 1px solid var(--border); background: #fff; overflow: hidden; }
    .sbar-header { padding: 9px 14px 7px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .sbar-count { font-size: 11px; color: var(--warm-gray); }
    .sbar-count span { color: var(--gold-dark); font-weight: 700; }
    .sbar-list { overflow-y: auto; flex: 1; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .sbar-list::-webkit-scrollbar { width: 3px; }
    .sbar-list::-webkit-scrollbar-thumb { background: var(--border); }
    .card { padding: 11px 14px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .12s; }
    .card:last-child { border-bottom: none; }
    .card:hover { background: #FFFBF0; }
    .card.active { background: #FFF8E8; border-left: 3px solid var(--gold); }
    .card-top { display: flex; align-items: flex-start; gap: 7px; margin-bottom: 3px; }
    .card-badge { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 7px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; color: #fff; }
    .badge-gran { background: var(--gran); }
    .badge-top20 { background: var(--top20); }
    .badge-winner { background: var(--winner); }
    .badge-nominated { background: var(--nominated); }
    .card-name { font-family: 'Playfair Display', serif; font-size: 13.5px; font-weight: 700; line-height: 1.3; }
    .card-cat { font-size: 10.5px; color: var(--warm-gray); margin-bottom: 5px; line-height: 1.4; }
    .card-links { display: flex; flex-direction: column; gap: 2px; }
    .card-links a { font-size: 10.5px; color: var(--gold-dark); text-decoration: none; display: flex; align-items: center; gap: 4px; }
    .card-links a:hover { text-decoration: underline; }
    .card-res { display: inline-block; margin-top: 4px; font-size: 9.5px; padding: 2px 6px; border-radius: 5px; font-weight: 600; }
    .res-req { background: #FFF0E0; color: #B05000; }
    .res-no { background: #E8F5E9; color: #2D6A4F; }
    #map { flex: 1; z-index: 1; }
    /* Leaflet popup */
    .leaflet-popup-content-wrapper { border-radius: 10px !important; box-shadow: 0 4px 20px rgba(0,0,0,.15) !important; border: 1px solid var(--border) !important; padding: 0 !important; font-family: 'DM Sans', sans-serif !important; }
    .leaflet-popup-content { margin: 0 !important; min-width: 230px !important; }
    .popup-inner { padding: 13px 15px; }
    .popup-badge { display: inline-block; font-size: 9.5px; font-weight: 700; padding: 2px 7px; border-radius: 7px; color: #fff; margin-bottom: 5px; }
    .popup-name { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 700; line-height: 1.3; margin-bottom: 3px; color: var(--ink); }
    .popup-cat { font-size: 10.5px; color: var(--warm-gray); margin-bottom: 7px; line-height: 1.4; }
    .popup-meta { display: flex; flex-direction: column; gap: 3px; margin-bottom: 7px; }
    .popup-meta a { font-size: 11px; color: var(--gold-dark); text-decoration: none; display: flex; align-items: center; gap: 4px; }
    .popup-meta a:hover { text-decoration: underline; }
    .popup-res { display: inline-block; font-size: 9.5px; padding: 2px 7px; border-radius: 5px; font-weight: 600; }
    .popup-gmaps { display: block; margin-top: 9px; text-align: center; background: var(--ink); color: #fff !important; border-radius: 6px; padding: 7px; font-size: 11.5px; font-weight: 600; text-decoration: none !important; transition: background .15s; }
    .popup-gmaps:hover { background: #333 !important; }
    .dot-marker { width: 13px; height: 13px; border-radius: 50%; border: 2.5px solid #fff; box-shadow: 0 1px 5px rgba(0,0,0,.4); cursor: pointer; }
    @media (max-width: 768px) {

      #map { height: 58vw; min-height: 280px; flex: none; }
      .fsearch { margin-left: 0; width: 100%; }
      .fsearch input { width: 100%; }
      .h-count { display: none; }

const COLORS = {gran:'#0F0D0A',top20:'#C9A84C',winner:'#2D6A4F',nominated:'#7A7060'};
function typeOf(r){ return r.types.includes('gran')?'gran':r.types.includes('top20')?'top20':r.types.includes('winner')?'winner':'nominated'; }

// Init map
const map = L.map('map',{zoomControl:true}).setView([-12.105,-77.030],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a>',maxZoom:19
}).addTo(map);

// Create markers
const markers = DATA.map((r,i)=>{
  const color = COLORS[typeOf(r)];
  const icon = L.divIcon({
    className:'',
    html:`<div class="dot-marker" style="background:${color}"></div>`,
    iconSize:[13,13], iconAnchor:[6,6], popupAnchor:[0,-10]
  });
  const popup = `
    <div class="popup-inner">
      <span class="popup-badge" style="background:${color}">${r.rank}</span>
      <div class="popup-name">${r.name}</div>
      <div class="popup-cat">${r.cat} · <strong>${r.district}</strong></div>
      <div class="popup-meta">
        ${r.phone?`<a href="tel:${r.phone.replace(/\s/g,'')}">📞 ${r.phone}</a>`:''}
        ${r.web?`<a href="https://${r.web}" target="_blank">🌐 ${r.web}</a>`:''}
      </div>
      <span class="popup-res ${r.res==='req'?'res-req':'res-no'}">${r.resNote}</span>
      <a class="popup-gmaps" href="${r.gmaps}" target="_blank">📍 Ver en Google Maps</a>
    </div>`;
  return L.marker([r.lat,r.lng],{icon}).addTo(map).bindPopup(popup,{maxWidth:270});
});

// Sidebar
let activeF='all', searchQ='', activeEl=null;

function render(){
  const list=document.getElementById('list');
  const countEl=document.getElementById('count');
  const hEl=document.getElementById('hcount');
  const filtered=DATA.filter((r,i)=>{
    const mf=activeF==='all'||r.types.includes(activeF);
    const ms=!searchQ||r.name.toLowerCase().includes(searchQ)||r.cat.toLowerCase().includes(searchQ)||r.district.toLowerCase().includes(searchQ);
    return mf&&ms;
  });
  countEl.textContent=filtered.length;
  hEl.textContent=filtered.length;
  DATA.forEach((r,i)=>{
    const show=filtered.includes(r);
    if(show){if(!map.hasLayer(markers[i]))markers[i].addTo(map);}
    else{if(map.hasLayer(markers[i]))markers[i].remove();}
  });
  list.innerHTML=filtered.map(r=>{
    const i=DATA.indexOf(r);
    const t=typeOf(r);
    return `<div class="card" data-i="${i}" onclick="cardClick(${i},this)">
      <div class="card-top">
        <span class="card-badge badge-${t}">${r.rank}</span>
        <span class="card-name">${r.name}</span>
      </div>
      <div class="card-cat">${r.cat} · <strong>${r.district}</strong></div>
      <div class="card-links">
        ${r.phone?`<a href="tel:${r.phone.replace(/\s/g,'')}">📞 ${r.phone}</a>`:''}
        ${r.web?`<a href="https://${r.web}" target="_blank">🌐 ${r.web}</a>`:''}
        <a href="${r.gmaps}" target="_blank">📍 Google Maps</a>
      </div>
      <span class="card-res ${r.res==='req'?'res-req':'res-no'}">${r.resNote}</span>
    </div>`;
  }).join('');
}

function cardClick(i,el){
  if(activeEl)activeEl.classList.remove('active');
  el.classList.add('active');
  activeEl=el;
  map.setView([DATA[i].lat,DATA[i].lng],16,{animate:true});
  markers[i].openPopup();
}

document.querySelectorAll('.fbtn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeF=btn.dataset.f;
    render();
  });
});

document.getElementById('search').addEventListener('input',e=>{
  searchQ=e.target.value.toLowerCase().trim();
  render();
});

render();
</script>
